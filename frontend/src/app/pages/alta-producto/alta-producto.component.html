<div style="padding: 20px; max-width: 500px; font-family: sans-serif;">
  <h2>Registrar Nuevo Producto</h2>
  
  <form [formGroup]="form" (ngSubmit)="guardar()" style="display: flex; flex-direction: column; gap: 15px;">
    
    <!-- NOMBRE -->
    <div>
      <label>Nombre del Producto:</label>
      <input type="text" formControlName="nombre" style="width: 100%; padding: 8px;">
    </div>

    <!-- PRECIO Y STOCK -->
    <div style="display: flex; gap: 10px;">
      <div style="flex: 1;">
        <label>Precio ($):</label>
        <input type="number" formControlName="precio" style="width: 100%; padding: 8px;">
      </div>
      <div style="flex: 1;">
        <label>Stock:</label>
        <input type="number" formControlName="stock" style="width: 100%; padding: 8px;">
      </div>
    </div>

    <div>
      <label>Categoría:</label>
      <input type="text" formControlName="categoria" style="width: 100%; padding: 8px;">
    </div>

    <div>
      <label>Marca:</label>
      <input type="text" formControlName="marca" style="width: 100%; padding: 8px;">
    </div>

    <div>
      <label>Descripción:</label>
      <textarea formControlName="descripcion" style="width: 100%; padding: 8px;"></textarea>
    </div>

    <!-- IMAGEN -->
    <div>
      <label>URL de la Imagen:</label>
      <input type="text" formControlName="imagen" placeholder="https://..." style="width: 100%; padding: 8px;">
    </div>

    <!-- BOTÓN -->
    <button 
      type="submit" 
      [disabled]="form.invalid"
      style="padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px;">
      Confirmar y Guardar
    </button>

  </form>
</div>
