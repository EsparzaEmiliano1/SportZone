<div class="contacto-container">
    <h1>Contactanos</h1>
    <p>¿Tienes dudas sobre una prenda o tu pedido? Nuestro equipo de SportZone te ayuda.</p>
  <div *ngIf="enviado" class="alert-success">
    ¡Mensaje enviado con exito! Nos comunicaremos contigo pronto.
  </div>

  <form #contactoForm="ngForm" (ngSubmit)="enviarMensaje()" class="form-contacto">
    <div class="field">
      <label>Nombre Completo:</label>
      <input type="text" name="nombre" [(ngModel)]="contacto.nombre" required #nom="ngModel">
      <span *ngIf="nom.invalid && nom.touched" class="error">El nombre es obligatorio</span>
    </div>

    <div class="field">
      <label>Correo Electronico:</label>
      <input type="email" name="correo" [(ngModel)]="contacto.correo" required email #email="ngModel">
      <span *ngIf="email.invalid && email.touched" class="error">Ingresa un correo valido</span>
    </div>

    <div class="field">
      <label>Asunto:</label>
      <select name="asunto" [(ngModel)]="contacto.asunto">
        <option value="Duda tecnica">Duda tecnica</option>
        <option value="Pedido">Seguimiento de pedido</option>
        <option value="Otro">Otro</option>
      </select>
    </div>

    <div class="field">
      <label>Mensaje:</label>
      <textarea name="mensaje" [(ngModel)]="contacto.mensaje" required minlength="10" #msj="ngModel"></textarea>
      <span *ngIf="msj.invalid && msj.touched" class="error">El mensaje debe ser mas largo</span>
    </div>

    <button type="submit" [disabled]="contactoForm.invalid">Enviar Mensaje</button>
  </form>
</div>
