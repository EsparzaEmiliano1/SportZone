<div class="catalogo-container">
  <header class="catalogo-header">
    <h1>Catalogo de <span>Productos</span></h1>
    <p>Equipamiento de alto rendimiento para deportistas</p>
  </header>

  <div *ngIf="productos.length === 0" class="loading-state">
    <div class="spinner"></div>
    <p>Buscando productos en la base de datos...</p>
  </div>

  <div class="product-grid" *ngIf="productos.length > 0">
    <app-producto-card 
      *ngFor="let producto of productos" 
      [p]="producto" 
      (onAgregar)="agregarAlCarrito($event)">
    </app-producto-card>
  </div>
</div>
