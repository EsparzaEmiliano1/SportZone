<div style="padding: 20px; font-family: sans-serif;">
  <h2 style="border-bottom: 2px solid #333; padding-bottom: 10px;">Catalogo de Refacciones</h2>

  <div *ngIf="productos.length === 0" style="color: #666; font-style: italic;">
    Conectando con el servidor de Aguascalientes... si no carga, revisa el backend.
  </div>

  <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px;">
    <div *ngFor="let p of productos" style="border: 1px solid #ddd; border-radius: 8px; padding: 15px; background: #fff; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);">
      <img [src]="p.imagen" alt="Producto" style="width: 100%; height: 120px; object-fit: contain; margin-bottom: 10px;">
      <h3 style="margin: 0 0 10px 0; font-size: 1.1rem;">{{ p.nombre }}</h3>
      <p style="color: #666; font-size: 0.9rem;">Categoria: {{ p.categoria }}</p>
      <p style="font-weight: bold; color: #2c3e50; font-size: 1.2rem;">${{ p.precio }}</p>
      <button [routerLink]="['/productos', p.id]" style="width: 100%; padding: 8px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer;">
        Ver detalles
      </button>
    </div>
  </div>
</div>
